<div class="auth-container">
  <div class="auth-card">
    <ui-text element="h1" size="xl" weight="semibold">Change Password</ui-text>
    <ui-text element="p" tone="muted">Choose a new password for your account</ui-text>

    @if (errorMessage) {
      <div class="error-banner">
        {{ errorMessage }}
      </div>
    }

    @if (successMessage) {
      <div class="success-banner">
        {{ successMessage }}
      </div>
    }

    <form class="auth-form">
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input
          id="newPassword"
          type="password"
          [(ngModel)]="newPassword"
          name="newPassword"
          placeholder="At least 6 characters"
          required
          />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm New Password</label>
        <input
          id="confirmPassword"
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="Re-enter your new password"
          required
          />
      </div>

      <ui-button
        variant="primary"
        [label]="loading ? 'Updating...' : 'Change Password'"
        [disabled]="loading"
        (buttonClick)="onChangePassword()"
      ></ui-button>
    </form>

    <p class="auth-link">
      <a routerLink="/dashboard">Back to Dashboard</a>
    </p>
  </div>
</div>
