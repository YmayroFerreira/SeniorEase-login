<div class="auth-container">
  <div class="auth-card auth-card--wide">
    <ui-text element="h1" size="xl" weight="semibold">Settings</ui-text>
    <ui-text element="p" tone="muted">Customize your experience</ui-text>

    @if (loading) {
      <div class="loading-text">Loading settings...</div>
    }

    @if (errorMessage) {
      <div class="error-banner">
        {{ errorMessage }}
      </div>
    }

    @if (successMessage) {
      <div class="success-banner">
        {{ successMessage }}
      </div>
    }

    @if (!loading) {
      <form class="auth-form">
        <div class="form-group">
          <label for="displayName">Display Name</label>
          <input
            id="displayName"
            type="text"
            [(ngModel)]="config.displayName"
            name="displayName"
            placeholder="Your name"
            />
        </div>
        <div class="form-group">
          <label for="theme">Theme</label>
          <select id="theme" [(ngModel)]="config.theme" name="theme">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
        <div class="form-group">
          <label for="language">Language</label>
          <select id="language" [(ngModel)]="config.language" name="language">
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="pt">Portuguese</option>
            <option value="de">German</option>
          </select>
        </div>
        <div class="form-group form-group--checkbox">
          <label>
            <input
              type="checkbox"
              [(ngModel)]="config.notifications"
              name="notifications"
              />
            Enable notifications
          </label>
        </div>
        <ui-button
          variant="primary"
          [label]="saving ? 'Saving...' : 'Save Settings'"
          [disabled]="saving"
          (buttonClick)="onSave()"
        ></ui-button>
      </form>
    }

    <p class="auth-link">
      <a routerLink="/dashboard">Back to Dashboard</a>
    </p>
  </div>
</div>
